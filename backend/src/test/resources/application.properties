spring.datasource.url=jdbc:h2:mem:repair_test;MODE=MySQL;NON_KEYWORDS=USER,YEAR;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=60000

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.flyway.enabled=false
spring.sql.init.mode=always
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=OFF

security.jwt.secret=RepairJwtSecretKeyForTestsOnlyChangeMe12345
security.jwt.access-expiration-seconds=3600
security.jwt.refresh-expiration-seconds=604800

ai.diagnosis.api.key=test-key
ai.diagnosis.api.base-url=http://localhost
ai.diagnosis.api.model=gpt-4.1
