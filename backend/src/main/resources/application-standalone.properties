spring.application.name=backend
server.port=${APP_PORT:8080}

# Standalone packages run without a separately installed MySQL server.
# Data is stored under APP_DATA_DIR, which the launch scripts point at ./data.
spring.datasource.url=jdbc:h2:file:${APP_DATA_DIR:${user.home}/.fangxingwei-ai}/database/fangxingwei;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER,YEAR;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false
spring.sql.init.mode=never
spring.h2.console.enabled=false

standalone.demo-data.enabled=${STANDALONE_DEMO_DATA_ENABLED:true}

# Optional package-time MySQL snapshot imported on first standalone startup.
standalone.mysql-snapshot.enabled=${STANDALONE_MYSQL_SNAPSHOT_ENABLED:true}
standalone.mysql-snapshot.path=${STANDALONE_MYSQL_SNAPSHOT_PATH:}
