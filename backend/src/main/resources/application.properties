spring.application.name=backend
server.port=8080

# Datasource
db.server=${MYSQL_HOST:localhost}
db.port=${MYSQL_PORT:3306}
db.name=${MYSQL_DATABASE:car_repair}
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:car_repair}?serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=22

# Logging
logging.pattern.level=%5p [requestId:%X{requestId:-}]

# AI Diagnosis API Configuration
ai.diagnosis.api.key=${AI_DIAGNOSIS_API_KEY:}
ai.diagnosis.api.base-url=${AI_DIAGNOSIS_API_BASE_URL:https://api.apiyi.com/v1}
ai.diagnosis.api.model=${AI_DIAGNOSIS_API_MODEL:deepseek-chat}

# JWT
security.jwt.secret=${SECURITY_JWT_SECRET:RepairJwtSecretKeyForLocalDevOnlyChangeMe12345}
security.jwt.access-expiration-seconds=${SECURITY_JWT_ACCESS_EXPIRATION_SECONDS:3600}
security.jwt.refresh-expiration-seconds=${SECURITY_JWT_REFRESH_EXPIRATION_SECONDS:604800}
